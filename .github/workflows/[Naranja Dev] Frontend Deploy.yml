name: Frontend - Equipo Naranja

on:
  push:
    branches: [ front_GL, Backend ]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [ front_GL, Backend ]
    paths:
      - 'Frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Correr Lint
        run: npm lint

      - name: Construir aplicación (Build)
        run: npm run build
      
      - name: Deploy a Vercel (DEV)
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.NARANJA_VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.NARANJA_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.NARANJA_VERCEL_PROJECT_ID }}