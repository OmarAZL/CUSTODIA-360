name: Backend - Spring Boot CI

on:
  push:
    branches: [ Backend, front_GL ]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [ Backend, front_GL ]
    paths:
      - 'Backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y Ejecutar Pruebas
        run: mvn clean verify
      
      - name: Guardar el archivo .JAR generado
        uses: actions/upload-artifact@v4
        with:
          name: custodia-360-backend-jar # El nombre que tendrá el archivo descargable
          path: Backend/target/*.jar     # La ruta donde Maven escupe el binario
          retention-days: 7
